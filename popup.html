<!DOCTYPE html>
<html>
<body>
<style>
    .contentss {
        font-family: Arial, sans-serif;
        padding: 20px;
    }

    #preview div.active {
        background-color: lightblue;
    }

    #preview.playing div.active {
        background-color: yellow;
    }
</style>
<div class="contentss">

    <h3>Recorder</h3>
    <div style="display: flex; flex-direction: column;">
        <button id="togglerecording">Start Recording</button>
        <button id="export">Edit Actions</button>
        <button id="clear">Clear Actions</button>
        <button id="copy">Copy Actions</button>
        <button id="play">Play Recording</button>
        <input type="number" name="tries" id="tries" placeholder="Number of tries" value="1">
        <button id="restart">Restart Recording</button>
        <input type="file" id="csvInput" accept=".csv" />
        <span id="info-label"></span>
    </div>

    <textarea id="editor" style="width:100%; height:300px; display: none; padding:10px;"></textarea>

    <pre id="preview" style="
        height:300px;
        overflow:auto;
        border:1px solid #ccc;
        padding:10px;
        display:none;
        "></pre>

    <div id="dropzone" style="
    border: 2px dashed #888;
    padding: 20px;
    text-align: center;
    margin-bottom: 10px;
    ">
    Drag & Drop actions.json here
    </div>
</div>
<script src="popup.js"></script>

</body>
</html>
